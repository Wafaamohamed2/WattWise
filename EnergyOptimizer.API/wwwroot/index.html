<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Optimizer - Live Test</title>
    <script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr/dist/browser/signalr.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .status {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

            .status.connected {
                border-left: 5px solid #10b981;
            }

            .status.disconnected {
                border-left: 5px solid #ef4444;
            }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

            .card h2 {
                color: #667eea;
                margin-bottom: 15px;
                font-size: 1.3em;
            }

        .reading {
            padding: 15px;
            background: #f3f4f6;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .reading-header {
            font-weight: bold;
            color: #1f2937;
            margin-bottom: 5px;
        }

        .reading-data {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            font-size: 0.9em;
            color: #6b7280;
        }

        .metric {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
        }

        .metric-label {
            font-weight: 500;
        }

        .metric-value {
            color: #667eea;
            font-weight: bold;
        }

        .dashboard-update {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .dashboard-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
        }

        .stat-label {
            opacity: 0.9;
            font-size: 0.9em;
        }

        .log {
            background: #1f2937;
            color: #10b981;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
            max-height: 300px;
            overflow-y: auto;
        }

        .log-entry {
            margin-bottom: 5px;
        }

        .timestamp {
            color: #6b7280;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ Energy Optimizer - Live Monitor</h1>

        <div id="connectionStatus" class="status disconnected">
            <strong>Status:</strong> <span id="statusText">Connecting...</span>
        </div>

        <div id="dashboardUpdate" class="dashboard-update" style="display: none;">
            <h2>📊 Live Dashboard</h2>
            <div class="dashboard-stats">
                <div class="stat">
                    <div class="stat-value" id="totalConsumption">0</div>
                    <div class="stat-label">Total kW</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="activeDevices">0</div>
                    <div class="stat-label">Active Devices</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="totalReadings">0</div>
                    <div class="stat-label">Readings</div>
                </div>
            </div>
        </div>

        <div class="grid">
            <div class="card">
                <h2>📈 Latest Readings</h2>
                <div id="readings"></div>
            </div>

            <div class="card">
                <h2>🔥 Top Consumers</h2>
                <div id="topConsumers"></div>
            </div>
        </div>

        <div class="card">
            <h2>📝 Event Log</h2>
            <div id="log" class="log"></div>
        </div>
    </div>

    <script>
        const connection = new signalR.HubConnectionBuilder()
            .withUrl("https://localhost:7083/energyhub")
            .withAutomaticReconnect()
            .configureLogging(signalR.LogLevel.Information)
            .build();

        // Connection status
        connection.onreconnecting(() => {
            updateStatus("Reconnecting...", false);
            log("🔄 Reconnecting...");
        });

        connection.onreconnected(() => {
            updateStatus("Connected", true);
            log("✅ Reconnected successfully");
        });

        connection.onclose(() => {
            updateStatus("Disconnected", false);
            log("❌ Connection closed");
        });

        // Handle Connected event
        connection.on("Connected", (data) => {
            log(`✅ Connected: ${data.message}`);
            updateStatus("Connected", true);
        });

        // Handle ReceiveReadings
        connection.on("ReceiveReadings", (readings) => {
            log(`📊 Received ${readings.length} readings`);
            displayReadings(readings);
        });

        // Handle DashboardUpdate
        connection.on("DashboardUpdate", (update) => {
            log("📈 Dashboard update received");
            displayDashboardUpdate(update);
        });

        // Start connection
        async function start() {
            try {
                await connection.start();
                log("🚀 SignalR connection started");
                updateStatus("Connected", true);
            } catch (err) {
                log(`❌ Error: ${err}`);
                setTimeout(start, 5000);
            }
        }

        function updateStatus(text, connected) {
            document.getElementById("statusText").textContent = text;
            const statusDiv = document.getElementById("connectionStatus");
            statusDiv.className = connected ? "status connected" : "status disconnected";
        }

        function displayReadings(readings) {
            const container = document.getElementById("readings");
            container.innerHTML = "";

            if (!readings || readings.length === 0) {
                container.innerHTML = '<div class="empty-state">No active devices</div>';
                return;
            }

            // Sort by consumption (highest first)
            const sortedReadings = [...readings].sort((a, b) =>
                b.powerConsumptionKW - a.powerConsumptionKW
            );

            sortedReadings.slice(0, 5).forEach(reading => {
                const div = document.createElement("div");
                div.className = "reading";
                div.innerHTML = `
            <div class="reading-header">
                <span>${reading.deviceName || 'Unknown Device'}</span>
                <span class="device-type">${reading.deviceType || 'N/A'}</span>
            </div>
            <div style="font-size: 0.85em; color: #6b7280; margin-bottom: 8px;">
                📍 ${reading.zoneName || 'Unknown Zone'}
            </div>
            <div class="reading-data">
                <div class="metric">
                    <span class="metric-label">⚡ Power:</span>
                    <span class="metric-value">${(reading.powerConsumptionKW || 0).toFixed(3)} kW</span>
                </div>
                <div class="metric">
                    <span class="metric-label">🔌 Voltage:</span>
                    <span class="metric-value">${(reading.voltage || 0).toFixed(1)} V</span>
                </div>
                <div class="metric">
                    <span class="metric-label">⚡ Current:</span>
                    <span class="metric-value">${(reading.current || 0).toFixed(2)} A</span>
                </div>
                <div class="metric">
                    <span class="metric-label">🌡️ Temp:</span>
                    <span class="metric-value">${(reading.temperature || 0).toFixed(1)} °C</span>
                </div>
            </div>
        `;
                container.appendChild(div);
            });
        }

        function displayDashboardUpdate(update) {
            document.getElementById("dashboardUpdate").style.display = "block";
            document.getElementById("totalConsumption").textContent = update.totalConsumption.toFixed(2);
            document.getElementById("activeDevices").textContent = update.activeDevices;
            document.getElementById("totalReadings").textContent = update.totalReadings;

            const topConsumersDiv = document.getElementById("topConsumers");
            topConsumersDiv.innerHTML = "";

            update.topConsumers.forEach((device, index) => {
                const div = document.createElement("div");
                div.className = "reading";
                div.innerHTML = `
                    <div class="reading-header">
                        #${index + 1} ${device.deviceName}
                    </div>
                    <div class="metric">
                        <span class="metric-label">Consumption:</span>
                        <span class="metric-value">${device.currentConsumption.toFixed(3)} kW</span>
                    </div>
                `;
                topConsumersDiv.appendChild(div);
            });
        }

        function log(message) {
            const logDiv = document.getElementById("log");
            const timestamp = new Date().toLocaleTimeString();
            const entry = document.createElement("div");
            entry.className = "log-entry";
            entry.innerHTML = `<span class="timestamp">[${timestamp}]</span> ${message}`;
            logDiv.insertBefore(entry, logDiv.firstChild);

            // Keep only last 50 entries
            while (logDiv.children.length > 50) {
                logDiv.removeChild(logDiv.lastChild);
            }
        }

        // Start the connection
        start();
    </script>
</body>
</html>
