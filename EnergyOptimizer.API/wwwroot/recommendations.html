<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recommendations - Energy Optimizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 25px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

            .header h1 {
                color: #667eea;
                font-size: 2em;
                display: flex;
                align-items: center;
                gap: 12px;
            }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }

            .btn-secondary:hover {
                background: #667eea;
                color: white;
            }

        .stats-bar {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .stat-item {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            background: #f9fafb;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #6b7280;
            font-size: 0.9em;
        }

        .filters-bar {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

            .filter-group label {
                font-size: 0.85em;
                color: #6b7280;
                font-weight: 600;
            }

        .filter-select {
            padding: 8px 12px;
            border: 2px solid #e5e7eb;
            border-radius: 6px;
            font-size: 0.95em;
            cursor: pointer;
            min-width: 150px;
        }

            .filter-select:focus {
                outline: none;
                border-color: #667eea;
            }

        .content-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .recommendations-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .recommendation-card {
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
            background: #fafafa;
        }

            .recommendation-card:hover {
                border-color: #667eea;
                box-shadow: 0 5px 15px rgba(102, 126, 234, 0.1);
                transform: translateY(-2px);
            }

        .rec-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .rec-title-section {
            flex: 1;
        }

        .rec-title {
            font-size: 1.2em;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .rec-category {
            font-size: 0.85em;
            color: #6b7280;
            background: #f3f4f6;
            padding: 4px 10px;
            border-radius: 6px;
            display: inline-block;
        }

        .priority-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .priority-high {
            background: #fee2e2;
            color: #991b1b;
        }

        .priority-medium {
            background: #fef3c7;
            color: #92400e;
        }

        .priority-low {
            background: #dbeafe;
            color: #1e40af;
        }

        .rec-description {
            color: #4b5563;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .rec-savings {
            display: flex;
            gap: 20px;
            padding: 15px;
            background: #f0fdf4;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .savings-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            color: #16a34a;
        }

        .action-items {
            margin-bottom: 15px;
        }

        .action-items-title {
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .action-items-list {
            padding-left: 20px;
        }

            .action-items-list li {
                color: #4b5563;
                margin-bottom: 5px;
                line-height: 1.5;
            }

        .rec-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid #e5e7eb;
        }

        .rec-meta {
            display: flex;
            gap: 15px;
            font-size: 0.85em;
            color: #6b7280;
        }

        .rec-actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 0.85em;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .action-btn-implement {
            background: #10b981;
            color: white;
        }

            .action-btn-implement:hover {
                background: #059669;
            }

        .action-btn-delete {
            background: #ef4444;
            color: white;
        }

            .action-btn-delete:hover {
                background: #dc2626;
            }

        .action-btn:disabled {
            background: #d1d5db;
            cursor: not-allowed;
        }

        .implemented-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: #10b981;
            color: white;
            border-radius: 6px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 30px;
        }

        .page-btn {
            padding: 8px 16px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

            .page-btn:hover:not(:disabled) {
                background: #667eea;
                color: white;
            }

            .page-btn:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }

            .page-btn.active {
                background: #667eea;
                color: white;
            }

        .loading, .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6b7280;
        }

        .spinner {
            border: 4px solid #f3f4f6;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .empty-icon {
            font-size: 4em;
            margin-bottom: 15px;
            opacity: 0.5;
        }
        /* ===== Navigation Menu ===== */
        .main-nav {
            background: white;
            padding: 18px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

            .main-nav ul {
                display: flex;
                justify-content: center;
                justify-content: center;
                flex-wrap: wrap;
                gap: 30px;
                list-style: none;
                margin: 0;
                padding: 0;
            }

            .main-nav li a {
                color: #667eea;
                text-decoration: none;
                font-weight: 600;
                font-size: 1.1em;
                padding: 12px 24px;
                border-radius: 12px;
                transition: all 0.3s ease;
                display: flex;
                align-items: center;
                gap: 10px;
                position: relative;
            }

                .main-nav li a:hover {
                    background: #667eea;
                    color: white;
                    transform: translateY(-3px);
                    box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
                }

                .main-nav li a.active {
                    background: linear-gradient(135deg, #667eea, #764ba2);
                    color: white;
                    box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
                    transform: translateY(-3px);
                }

        /* Responsive */
        @media (max-width: 900px) {
            .main-nav ul {
                gap: 15px;
            }

            .main-nav li a {
                padding: 10px 16px;
                font-size: 1em;
            }
        }

        @media (max-width: 600px) {
            .main-nav ul {
                flex-direction: column;
                align-items: center;
            }

            .main-nav li a {
                width: 80%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Navigation Menu -->
        <nav class="main-nav">
            <ul>
                <li><a href="index.html" class="active-if-index">📊 Live Monitor</a></li>
                <li><a href="ai-dashboard.html" class="active-if-dashboard">🤖 AI Insights</a></li>
                <li><a href="anomalies.html" class="active-if-anomalies">🚨 Anomalies</a></li>
                <li><a href="analysis-history.html" class="active-if-history">📜 Analysis History</a></li>
                <li><a href="charts.html" class="active-if-charts">📈 Analytics & Charts</a></li>
            </ul>
        </nav>
        <!-- Header -->
        <div class="header">
            <h1>💡 Energy Recommendations</h1>
            <a href="ai-dashboard.html" class="btn btn-secondary">
                ← Back to Dashboard
            </a>
        </div>

        <!-- Statistics Bar -->
        <div class="stats-bar" id="statsBar">
            <div class="stat-item">
                <div class="stat-value" id="totalCount">-</div>
                <div class="stat-label">Total Recommendations</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="activeCount">-</div>
                <div class="stat-label">Active</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="implementedCount">-</div>
                <div class="stat-label">Implemented</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="highPriorityCount">-</div>
                <div class="stat-label">High Priority</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="savingsTotal">-</div>
                <div class="stat-label">Potential Savings (kWh)</div>
            </div>
        </div>

        <!-- Filters -->
        <div class="filters-bar">
            <div class="filter-group">
                <label>Status</label>
                <select class="filter-select" id="filterStatus" onchange="applyFilters()">
                    <option value="">All</option>
                    <option value="false" selected>Active Only</option>
                    <option value="true">Implemented</option>
                </select>
            </div>

            <div class="filter-group">
                <label>Priority</label>
                <select class="filter-select" id="filterPriority" onchange="applyFilters()">
                    <option value="">All Priorities</option>
                    <option value="High">High</option>
                    <option value="Medium">Medium</option>
                    <option value="Low">Low</option>
                </select>
            </div>

            <div class="filter-group">
                <label>Category</label>
                <select class="filter-select" id="filterCategory" onchange="applyFilters()">
                    <option value="">All Categories</option>
                </select>
            </div>
        </div>

        <!-- Content -->
        <div class="content-card">
            <div class="recommendations-list" id="recommendationsList">
                <div class="loading">
                    <div class="spinner"></div>
                    <div>Loading recommendations...</div>
                </div>
            </div>

            <!-- Pagination -->
            <div class="pagination" id="pagination" style="display: none;"></div>
        </div>
    </div>

    <script>
        const baseUrl = window.location.origin;
        let currentPage = 1;
        let totalPages = 1;
        let currentFilters = {
            isImplemented: 'false',
            priority: '',
            category: ''
        };

        // ===== Load Recommendations =====
        async function loadRecommendations() {
            try {
                const params = new URLSearchParams({
                    page: currentPage,
                    pageSize: 10,
                    ...(currentFilters.isImplemented && { isImplemented: currentFilters.isImplemented }),
                    ...(currentFilters.priority && { priority: currentFilters.priority }),
                    ...(currentFilters.category && { category: currentFilters.category })
                });

                const response = await fetch(`${baseUrl}/api/AI/recommendations?${params}`);
                const data = await response.json();

                displayStatistics(data.statistics);
                displayRecommendations(data.data);
                displayPagination(data.page, data.totalPages);
                populateCategories(data.data);
            } catch (error) {
                console.error('Error loading recommendations:', error);
                document.getElementById('recommendationsList').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">⚠️</div>
                        <div>Failed to load recommendations</div>
                    </div>
                `;
            }
        }

        function displayStatistics(stats) {
            document.getElementById('totalCount').textContent = stats.Total;
            document.getElementById('activeCount').textContent = stats.Pending;
            document.getElementById('implementedCount').textContent = stats.Implemented;
            document.getElementById('highPriorityCount').textContent = stats.HighPriority;
            document.getElementById('savingsTotal').textContent = stats.TotalEstimatedSavings.toFixed(1);
        }

        function displayRecommendations(recommendations) {
            const container = document.getElementById('recommendationsList');

            if (!recommendations || recommendations.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">✅</div>
                        <div>No recommendations found</div>
                        <p style="margin-top: 10px;">Try adjusting your filters</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = recommendations.map(rec => `
                <div class="recommendation-card">
                    <div class="rec-header">
                        <div class="rec-title-section">
                            <div class="rec-title">
                                ${rec.title}
                            </div>
                            <span class="rec-category">📁 ${rec.category}</span>
                        </div>
                        <span class="priority-badge priority-${rec.priority.toLowerCase()}">
                            ${rec.priority}
                        </span>
                    </div>

                    <div class="rec-description">${rec.description}</div>

                    <div class="rec-savings">
                        <div class="savings-item">
                            <span>⚡</span>
                            <span>${rec.estimatedSavingsKWh.toFixed(2)} kWh</span>
                        </div>
                        ${rec.estimatedSavingsPercent > 0 ? `
                            <div class="savings-item">
                                <span>📊</span>
                                <span>${rec.estimatedSavingsPercent.toFixed(1)}% reduction</span>
                            </div>
                        ` : ''}
                    </div>

                    ${rec.actionItems && rec.actionItems.length > 0 ? `
                        <div class="action-items">
                            <div class="action-items-title">
                                <span>📋</span>
                                <span>Action Steps:</span>
                            </div>
                            <ul class="action-items-list">
                                ${rec.actionItems.map(item => `<li>${item}</li>`).join('')}
                            </ul>
                        </div>
                    ` : ''}

                    <div class="rec-footer">
                        <div class="rec-meta">
                            <span>📅 Created: ${new Date(rec.createdAt).toLocaleDateString()}</span>
                            ${rec.daysUntilExpiry ? `<span>⏰ Expires in ${rec.daysUntilExpiry} days</span>` : ''}
                        </div>
                        <div class="rec-actions">
                            ${rec.isImplemented ? `
                                <div class="implemented-badge">
                                    <span>✓</span>
                                    <span>Implemented ${new Date(rec.implementedDate).toLocaleDateString()}</span>
                                </div>
                            ` : `
                                <button class="action-btn action-btn-implement" onclick="implementRecommendation(${rec.id})">
                                    <span>✓</span>
                                    <span>Mark as Implemented</span>
                                </button>
                                <button class="action-btn action-btn-delete" onclick="deleteRecommendation(${rec.id})">
                                    <span>🗑️</span>
                                    <span>Delete</span>
                                </button>
                            `}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function displayPagination(page, total) {
            totalPages = total;
            const pagination = document.getElementById('pagination');

            if (total <= 1) {
                pagination.style.display = 'none';
                return;
            }

            pagination.style.display = 'flex';

            let html = `
                <button class="page-btn" onclick="goToPage(${page - 1})" ${page === 1 ? 'disabled' : ''}>
                    ← Previous
                </button>
            `;

            for (let i = 1; i <= Math.min(total, 5); i++) {
                html += `
                    <button class="page-btn ${i === page ? 'active' : ''}" onclick="goToPage(${i})">
                        ${i}
                    </button>
                `;
            }

            if (total > 5) {
                html += `<span>...</span>`;
            }

            html += `
                <button class="page-btn" onclick="goToPage(${page + 1})" ${page === total ? 'disabled' : ''}>
                    Next →
                </button>
            `;

            pagination.innerHTML = html;
        }

        function populateCategories(recommendations) {
            const categories = [...new Set(recommendations.map(r => r.category))];
            const select = document.getElementById('filterCategory');

            categories.forEach(cat => {
                if (!Array.from(select.options).some(opt => opt.value === cat)) {
                    const option = document.createElement('option');
                    option.value = cat;
                    option.textContent = cat;
                    select.appendChild(option);
                }
            });
        }

        function applyFilters() {
            currentFilters = {
                isImplemented: document.getElementById('filterStatus').value,
                priority: document.getElementById('filterPriority').value,
                category: document.getElementById('filterCategory').value
            };
            currentPage = 1;
            loadRecommendations();
        }

        function goToPage(page) {
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            loadRecommendations();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ===== Actions =====
        async function implementRecommendation(id) {
            if (!confirm('Mark this recommendation as implemented?')) return;

            try {
                const response = await fetch(`${baseUrl}/api/AI/recommendations/${id}/implement`, {
                    method: 'PATCH'
                });

                if (response.ok) {
                    alert('✅ Recommendation marked as implemented!');
                    loadRecommendations();
                } else {
                    alert('❌ Failed to update recommendation');
                }
            } catch (error) {
                console.error('Error implementing recommendation:', error);
                alert('❌ Error updating recommendation');
            }
        }

        async function deleteRecommendation(id) {
            if (!confirm('Are you sure you want to delete this recommendation?')) return;

            try {
                const response = await fetch(`${baseUrl}/api/AI/recommendations/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    alert('✅ Recommendation deleted!');
                    loadRecommendations();
                } else {
                    alert('❌ Failed to delete recommendation');
                }
            } catch (error) {
                console.error('Error deleting recommendation:', error);
                alert('❌ Error deleting recommendation');
            }
        }

        // ===== Initialize =====
        loadRecommendations();
    </script>
</body>
</html>
