<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recommendations - Energy Optimizer</title>
    <script src="auth-helper.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 25px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

            .header h1 {
                color: #667eea;
                font-size: 2em;
                display: flex;
                align-items: center;
                gap: 12px;
            }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }

            .btn-secondary:hover {
                background: #667eea;
                color: white;
            }

        .stats-bar {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .stat-item {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            background: #f9fafb;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #6b7280;
            font-size: 0.9em;
        }

        .filters-bar {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

            .filter-group label {
                font-size: 0.85em;
                color: #6b7280;
                font-weight: 600;
            }

        .filter-select {
            padding: 8px 12px;
            border: 2px solid #e5e7eb;
            border-radius: 6px;
            font-size: 0.95em;
            cursor: pointer;
            min-width: 150px;
        }

            .filter-select:focus {
                outline: none;
                border-color: #667eea;
            }

        .content-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .recommendations-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .recommendation-card {
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
            background: #fafafa;
        }

            .recommendation-card:hover {
                border-color: #667eea;
                box-shadow: 0 5px 15px rgba(102, 126, 234, 0.1);
                transform: translateY(-2px);
            }

        .rec-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .rec-title-section {
            flex: 1;
        }

        .rec-title {
            font-size: 1.2em;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 5px;
        }

        .rec-category {
            font-size: 0.85em;
            color: #6b7280;
            background: #f3f4f6;
            padding: 4px 10px;
            border-radius: 6px;
            display: inline-block;
        }

        .priority-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 700;
            text-transform: uppercase;
        }

        .priority-high {
            background: #fee2e2;
            color: #991b1b;
        }

        .priority-medium {
            background: #fef3c7;
            color: #92400e;
        }

        .priority-low {
            background: #dbeafe;
            color: #1e40af;
        }

        .priority-critical {
            background: #7f1d1d;
            color: #fef2f2;
        }

        .rec-description {
            color: #4b5563;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .rec-savings {
            display: flex;
            gap: 20px;
            padding: 15px;
            background: #f0fdf4;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .savings-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            color: #16a34a;
        }

        .rec-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid #e5e7eb;
        }

        .rec-meta {
            display: flex;
            gap: 15px;
            font-size: 0.85em;
            color: #6b7280;
        }

        .rec-actions button:hover {
            background: #059669 !important;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .loading, .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6b7280;
        }

        .spinner {
            border: 4px solid #f3f4f6;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .empty-icon {
            font-size: 4em;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .error-message {
            background: #fef2f2;
            border: 2px solid #fecaca;
            color: #991b1b;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💡 Energy Recommendations</h1>
            <a href="ai-dashboard.html" class="btn btn-secondary">
                ← Back to Dashboard
            </a>
        </div>

        <div class="stats-bar" id="statsBar">
            <div class="stat-item">
                <div class="stat-value" id="totalCount">-</div>
                <div class="stat-label">Total Recommendations</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="activeCount">-</div>
                <div class="stat-label">Active</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="implementedCount">-</div>
                <div class="stat-label">Implemented</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="highPriorityCount">-</div>
                <div class="stat-label">High Priority</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="savingsTotal">-</div>
                <div class="stat-label">Potential Savings (kWh)</div>
            </div>
        </div>

        <div class="filters-bar">
            <div class="filter-group">
                <label>Status</label>
                <select class="filter-select" id="filterStatus" onchange="applyFilters()">
                    <option value="">All</option>
                    <option value="false" selected>Active Only</option>
                    <option value="true">Implemented</option>
                </select>
            </div>

            <div class="filter-group">
                <label>Priority</label>
                <select class="filter-select" id="filterPriority" onchange="applyFilters()">
                    <option value="">All Priorities</option>
                    <option value="Critical">Critical</option>
                    <option value="High">High</option>
                    <option value="Medium">Medium</option>
                    <option value="Low">Low</option>
                </select>
            </div>

            <div class="filter-group">
                <label>Category</label>
                <select class="filter-select" id="filterCategory" onchange="applyFilters()">
                    <option value="">All Categories</option>
                </select>
            </div>
        </div>

        <div class="content-card">
            <div class="recommendations-list" id="recommendationsList">
                <div class="loading">
                    <div class="spinner"></div>
                    <div>Loading recommendations...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const baseUrl = window.location.origin;
        let currentFilters = {
            isImplemented: 'false',
            priority: '',
            category: ''
        };

        function getPriorityText(priority) {
            if (typeof priority === 'string') return priority;

            switch (priority) {
                case 1: return 'High';
                case 2: return 'Medium';
                case 3: return 'Low';
                default: return 'Unknown';
            }
        }
        function getPriorityClass(priority) {
            const text = getPriorityText(priority);
            return text.toLowerCase();
        }
        async function loadRecommendations() {
            try {
                const status = currentFilters.isImplemented;
                let url = `${baseUrl}/api/AI/recommendations?pageSize=100`;
                if (status === 'false') url += '&isImplemented=false';
                else if (status === 'true') url += '&isImplemented=true';

                const [listResponse, statsResponse] = await Promise.all([
                    AuthHelper.fetchWithAuth(url),
                    AuthHelper.fetchWithAuth(`${baseUrl}/api/AI/recommendations/statistics`)
                ]);

                if (!listResponse || !listResponse.ok) throw new Error(`HTTP error! status: ${listResponse?.status}`);
                const listResult = await listResponse.json();
                console.log('[Recs] List response:', listResult);

                let list = listResult.details?.data
                    ?? listResult.details
                    ?? listResult.data
                    ?? (Array.isArray(listResult) ? listResult : []);

                if (statsResponse && statsResponse.ok) {
                    const statsResult = await statsResponse.json();
                    console.log('[Recs] Stats response:', statsResult);
                    const stats = statsResult.data ?? statsResult.details ?? statsResult;
                    displayStatistics(stats);
                } else {
                    console.warn('[Recs] Stats endpoint unavailable, calculating from list');
                    const allResponse = await AuthHelper.fetchWithAuth(`${baseUrl}/api/AI/recommendations?pageSize=1000`);
                    if (allResponse && allResponse.ok) {
                        const allResult = await allResponse.json();
                        const allList = allResult.details?.data ?? allResult.details ?? allResult.data ?? [];
                        displayStatistics({
                            total: allList.length,
                            pending: allList.filter(r => !r.isImplemented).length,
                            implemented: allList.filter(r => r.isImplemented).length,
                            highPriority: allList.filter(r => String(r.priority) === '1' || String(r.priority).toLowerCase() === 'high' || String(r.priority).toLowerCase() === 'critical').length,
                            totalEstimatedSavings: allList.reduce((s, r) => s + (r.estimatedSavingsKWh || 0), 0)
                        });
                    }
                }

                let filtered = list;
                if (currentFilters.priority) {
                    filtered = filtered.filter(r => String(r.priority).toLowerCase() === currentFilters.priority.toLowerCase());
                }
                if (currentFilters.category) {
                    filtered = filtered.filter(r => r.category === currentFilters.category);
                }

                populateCategories(list);

                if (filtered.length === 0) {
                    document.getElementById('recommendationsList').innerHTML =
                        '<div class="empty-state">No recommendations found for the selected filters.</div>';
                    return;
                }

                displayRecommendations(filtered);

            } catch (error) {
                console.error('[Recs] Fetch Error:', error);
                document.getElementById('recommendationsList').innerHTML =
                    `<div class="error-message">⚠️ Failed to load data: ${error.message}</div>`;
            }
        }

        function displayRecommendations(recommendations) {
            const container = document.getElementById('recommendationsList');

            container.innerHTML = recommendations.map(rec => {
                const priorityLabel = rec.priority ? String(rec.priority) : "Medium";
                const savings = rec.estimatedSavingsKWh || 0;

                return `
                <div class="recommendation-card">
                    <div class="rec-header">
                        <div class="rec-title-section">
                            <div class="rec-title">${rec.title || 'Optimization Tip'}</div>
                            <span class="rec-category">📁 ${rec.category || 'Efficiency'}</span>
                        </div>
                        <span class="priority-badge priority-${priorityLabel.toLowerCase()}">
                            ${priorityLabel === "1" ? "Critical" : (priorityLabel === "2" ? "High" : priorityLabel)}
                        </span>
                    </div>
                    <div class="rec-description">${rec.description || 'Analyze device usage to save energy.'}</div>
                    <div class="rec-savings">
                        <span>⚡ <strong>${Number(savings).toFixed(2)} kWh</strong> potential savings</span>
                    </div>
                    <div class="rec-footer">
                        <button onclick="implementRecommendation(${rec.id})" class="btn-implement"
                                style="background: #10b981; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer;">
                            Mark as Implemented
                        </button>
                    </div>
                </div>`;
            }).join('');
        }

        function updateTopStats(list) {
            document.getElementById('totalCount').textContent = list.length;
            document.getElementById('activeCount').textContent = list.filter(r => !r.isImplemented).length;
            document.getElementById('highPriorityCount').textContent = list.filter(r => String(r.priority) === '1' || String(r.priority).toLowerCase() === 'high').length;
            const totalSavings = list.reduce((sum, r) => sum + (r.estimatedSavingsKWh || 0), 0);
            document.getElementById('savingsTotal').textContent = totalSavings.toFixed(1);
        }

        function displayStatistics(stats) {
            if (!stats) {
                console.warn('[Recs] No statistics data received');
                return;
            }
            console.log('[Recs] Displaying statistics:', stats);

            const total = stats.Total ?? stats.total ?? stats.totalCount ?? 0;
            const pending = stats.Pending ?? stats.pending ?? stats.active ?? stats.Active ?? 0;
            const implemented = stats.Implemented ?? stats.implemented ?? stats.implementedCount ?? 0;
            const highPri = stats.HighPriority ?? stats.highPriority ?? stats.highPriorityCount ?? 0;
            const savings = stats.TotalEstimatedSavings ?? stats.totalEstimatedSavings ?? stats.totalSavings ?? stats.potentialSavings ?? 0;

            document.getElementById('totalCount').textContent = total;
            document.getElementById('activeCount').textContent = pending;
            document.getElementById('implementedCount').textContent = implemented;
            document.getElementById('highPriorityCount').textContent = highPri;
            document.getElementById('savingsTotal').textContent = Number(savings).toFixed(1);
        }
        function populateCategories(recommendations) {
            if (!recommendations || recommendations.length === 0) return;

            const categories = [...new Set(recommendations.map(r => r.category))];
            const select = document.getElementById('filterCategory');

            if (!select) return;

            while (select.options.length > 1) {
                select.remove(1);
            }

            categories.forEach(cat => {
                if (!Array.from(select.options).some(opt => opt.value === cat)) {
                    const option = document.createElement('option');
                    option.value = cat;
                    option.textContent = cat;
                    select.appendChild(option);
                }
            });
        }

        function applyFilters() {
            currentFilters = {
                isImplemented: document.getElementById('filterStatus').value,
                priority: document.getElementById('filterPriority').value,
                category: document.getElementById('filterCategory').value
            };

            console.log('Applying filters:', currentFilters);
            loadRecommendations();
        }

        // Implement Recommendation
        async function implementRecommendation(id) {
            if (!confirm('Mark this recommendation as implemented?')) return;

            try {
                const response = await AuthHelper.fetchWithAuth(`${baseUrl}/api/AI/recommendations/${id}/implement`, {
                    method: 'PATCH'
                });

                if (response.ok) {
                    alert('✅ Recommendation marked as implemented!');
                    loadRecommendations();
                } else {
                    const error = await response.json();
                    alert(`❌ Failed: ${error.error || 'Unknown error'}`);
                }
            } catch (error) {
                console.error('Error implementing recommendation:', error);
                alert('❌ Error updating recommendation');
            }
        }

        //  Initialize
        document.addEventListener('DOMContentLoaded', () => {
            console.log('Recommendations page loaded');

            // Check authentication
            if (!AuthHelper.checkAuth()) {
                console.log('Not authenticated, redirecting to login');
                return;
            }

            console.log('Loading recommendations...');
            loadRecommendations();
        });
    </script>
</body>
</html>
