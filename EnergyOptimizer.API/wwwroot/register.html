<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Energy Optimizer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .register-card {
            max-width: 440px;
            width: 100%;
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .brand {
            text-align: center;
            margin-bottom: 30px;
        }

            .brand h2 {
                color: #667eea;
                font-weight: 700;
                font-size: 1.8em;
            }

            .brand p {
                color: #6b7280;
                font-size: 0.95em;
            }

        .form-label {
            font-weight: 600;
            color: #374151;
            font-size: 0.9em;
        }

        .form-control {
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            padding: 10px 14px;
            transition: border-color 0.2s;
        }

            .form-control:focus {
                border-color: #667eea;
                box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            }

        .btn-register {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-weight: 600;
            font-size: 1em;
            transition: all 0.3s;
        }

            .btn-register:hover {
                transform: translateY(-2px);
                box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
            }

            .btn-register:disabled {
                opacity: 0.7;
                transform: none;
            }

        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #6b7280;
            font-size: 0.9em;
        }

            .login-link a {
                color: #667eea;
                font-weight: 600;
                text-decoration: none;
            }

                .login-link a:hover {
                    text-decoration: underline;
                }

        .password-hint {
            font-size: 0.78em;
            color: #9ca3af;
            margin-top: 4px;
        }

        .alert-message {
            border-radius: 8px;
            font-size: 0.9em;
            padding: 10px 14px;
        }
    </style>
</head>
<body>
    <div class="register-card">
        <div class="brand">
            <h2>⚡ Energy Optimizer</h2>
            <p>Create your account to get started</p>
        </div>

        <div id="message" style="display:none;" class="alert-message mb-3"></div>

        <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" id="fullName" class="form-control" placeholder="e.g. Ahmed Mohamed" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" id="password" class="form-control" placeholder="Create a strong password" required>
            <div class="password-hint">Min 8 characters, include uppercase, number, and symbol.</div>
        </div>

        <div class="mb-4">
            <label class="form-label">Confirm Password</label>
            <input type="password" id="confirmPassword" class="form-control" placeholder="Repeat your password" required>
        </div>

        <button class="btn btn-register btn-primary w-100" id="registerBtn" onclick="handleRegister()">
            Create Account
        </button>

        <div class="login-link">
            Already have an account? <a href="login.html">Sign in</a>
        </div>
    </div>

    <script>
        async function handleRegister() {
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const messageDiv = document.getElementById('message');
            const btn = document.getElementById('registerBtn');

            // Client-side validation
            if (!fullName || !email || !password || !confirmPassword) {
                showMessage('Please fill in all fields.', 'danger');
                return;
            }

            if (password !== confirmPassword) {
                showMessage('Passwords do not match.', 'danger');
                return;
            }

            if (password.length < 8) {
                showMessage('Password must be at least 8 characters.', 'danger');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Creating account...';

            try {
                const response = await fetch('/api/v1/account/register', {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, fullName })
                });

                const result = await response.json();

                if (response.ok) {
                    showMessage('Account created! Signing you in...', 'success');

                    // Auto-login after register
                    const loginResponse = await fetch('/api/v1/account/login', {
                        method: 'POST',
                        credentials: 'include',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });

                    if (loginResponse.ok) {
                        window.location.href = 'index.html';
                    } else {
                        // Registration succeeded but auto-login failed — send to login page
                        showMessage('Account created! Please sign in.', 'success');
                        setTimeout(() => window.location.href = 'login.html', 1500);
                    }
                } else {
                    showMessage(result.message || 'Registration failed. Please try again.', 'danger');
                    btn.disabled = false;
                    btn.textContent = 'Create Account';
                }
            } catch (error) {
                showMessage('Could not connect to the server. Please try again.', 'danger');
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        }

        function showMessage(text, type) {
            const div = document.getElementById('message');
            div.textContent = text;
            div.className = `alert-message mb-3 alert alert-${type}`;
            div.style.display = 'block';
        }

        // Allow Enter key to submit
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleRegister();
        });
    </script>
</body>
</html>
