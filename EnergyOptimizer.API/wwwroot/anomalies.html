<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anomalies - Energy Optimizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 25px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

            .header h1 {
                color: #667eea;
                font-size: 2em;
                display: flex;
                align-items: center;
                gap: 12px;
            }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }

            .btn-secondary:hover {
                background: #667eea;
                color: white;
            }

        .stats-bar {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
        }

        .stat-item {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            background: #f9fafb;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

            .stat-value.critical {
                color: #dc2626;
            }

            .stat-value.high {
                color: #f59e0b;
            }

            .stat-value.medium {
                color: #3b82f6;
            }

            .stat-value.resolved {
                color: #10b981;
            }

        .stat-label {
            color: #6b7280;
            font-size: 0.9em;
        }

        .filters-bar {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

            .filter-group label {
                font-size: 0.85em;
                color: #6b7280;
                font-weight: 600;
            }

        .filter-select, .filter-input {
            padding: 8px 12px;
            border: 2px solid #e5e7eb;
            border-radius: 6px;
            font-size: 0.95em;
            min-width: 150px;
        }

            .filter-select:focus, .filter-input:focus {
                outline: none;
                border-color: #667eea;
            }

        .content-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .anomalies-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .anomaly-card {
            border: 3px solid #e5e7eb;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
            background: #fafafa;
        }

            .anomaly-card.critical {
                border-left: 6px solid #dc2626;
                background: #fef2f2;
            }

            .anomaly-card.high {
                border-left: 6px solid #f59e0b;
                background: #fffbeb;
            }

            .anomaly-card.medium {
                border-left: 6px solid #3b82f6;
                background: #eff6ff;
            }

            .anomaly-card.low {
                border-left: 6px solid #10b981;
                background: #f0fdf4;
            }

            .anomaly-card.resolved {
                opacity: 0.7;
                border-color: #d1d5db;
                background: #f9fafb;
            }

            .anomaly-card:hover:not(.resolved) {
                transform: translateY(-3px);
                box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            }

        .anomaly-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .device-info {
            flex: 1;
        }

        .device-name {
            font-size: 1.3em;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .device-meta {
            display: flex;
            gap: 15px;
            font-size: 0.85em;
            color: #6b7280;
        }

        .severity-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .severity-critical {
            background: #dc2626;
            color: white;
        }

        .severity-high {
            background: #f59e0b;
            color: white;
        }

        .severity-medium {
            background: #3b82f6;
            color: white;
        }

        .severity-low {
            background: #10b981;
            color: white;
        }

        .anomaly-description {
            color: #4b5563;
            line-height: 1.6;
            margin-bottom: 15px;
            padding: 15px;
            background: rgba(255,255,255,0.5);
            border-radius: 8px;
        }

        .deviation-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            padding: 15px;
            background: rgba(255,255,255,0.7);
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .deviation-item {
            text-align: center;
        }

        .deviation-label {
            font-size: 0.75em;
            color: #6b7280;
            text-transform: uppercase;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .deviation-value {
            font-size: 1.5em;
            font-weight: 700;
            color: #1f2937;
        }

        .deviation-percent {
            color: #dc2626;
            font-size: 1.2em;
        }

        .possible-causes {
            margin-bottom: 15px;
        }

        .causes-title {
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .causes-list {
            padding-left: 20px;
        }

            .causes-list li {
                color: #4b5563;
                margin-bottom: 5px;
                line-height: 1.5;
            }

        .resolution-section {
            background: #f0fdf4;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .resolution-header {
            font-weight: 600;
            color: #16a34a;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .resolution-notes {
            color: #4b5563;
            font-style: italic;
        }

        .anomaly-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 2px solid rgba(0,0,0,0.1);
        }

        .anomaly-timestamps {
            display: flex;
            gap: 20px;
            font-size: 0.85em;
            color: #6b7280;
        }

        .anomaly-actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            font-size: 0.9em;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .action-btn-resolve {
            background: #10b981;
            color: white;
        }

            .action-btn-resolve:hover {
                background: #059669;
                transform: translateY(-2px);
            }

        .action-btn-delete {
            background: #ef4444;
            color: white;
        }

            .action-btn-delete:hover {
                background: #dc2626;
                transform: translateY(-2px);
            }

        .resolved-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 18px;
            background: #10b981;
            color: white;
            border-radius: 8px;
            font-weight: 600;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

            .modal.show {
                display: flex;
            }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .modal-header {
            font-size: 1.5em;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 20px;
        }

        .modal-body {
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

            .form-group label {
                display: block;
                font-weight: 600;
                color: #4b5563;
                margin-bottom: 8px;
            }

            .form-group textarea {
                width: 100%;
                padding: 12px;
                border: 2px solid #e5e7eb;
                border-radius: 8px;
                font-family: inherit;
                resize: vertical;
                min-height: 100px;
            }

                .form-group textarea:focus {
                    outline: none;
                    border-color: #667eea;
                }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn-cancel {
            background: #e5e7eb;
            color: #4b5563;
        }

            .btn-cancel:hover {
                background: #d1d5db;
            }

        .btn-confirm {
            background: #10b981;
            color: white;
        }

            .btn-confirm:hover {
                background: #059669;
            }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 30px;
        }

        .page-btn {
            padding: 8px 16px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

            .page-btn:hover:not(:disabled) {
                background: #667eea;
                color: white;
            }

            .page-btn:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }

            .page-btn.active {
                background: #667eea;
                color: white;
            }

        .loading, .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6b7280;
        }

        .spinner {
            border: 4px solid #f3f4f6;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .empty-icon {
            font-size: 4em;
            margin-bottom: 15px;
            opacity: 0.5;
        }
        /* ===== Navigation Menu ===== */
        .main-nav {
            background: white;
            padding: 18px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

            .main-nav ul {
                display: flex;
                justify-content: center;
                justify-content: center;
                flex-wrap: wrap;
                gap: 30px;
                list-style: none;
                margin: 0;
                padding: 0;
            }

            .main-nav li a {
                color: #667eea;
                text-decoration: none;
                font-weight: 600;
                font-size: 1.1em;
                padding: 12px 24px;
                border-radius: 12px;
                transition: all 0.3s ease;
                display: flex;
                align-items: center;
                gap: 10px;
                position: relative;
            }

                .main-nav li a:hover {
                    background: #667eea;
                    color: white;
                    transform: translateY(-3px);
                    box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
                }

                .main-nav li a.active {
                    background: linear-gradient(135deg, #667eea, #764ba2);
                    color: white;
                    box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
                    transform: translateY(-3px);
                }

        /* Responsive */
        @media (max-width: 900px) {
            .main-nav ul {
                gap: 15px;
            }

            .main-nav li a {
                padding: 10px 16px;
                font-size: 1em;
            }
        }

        @media (max-width: 600px) {
            .main-nav ul {
                flex-direction: column;
                align-items: center;
            }

            .main-nav li a {
                width: 80%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Navigation Menu -->
        <nav class="main-nav">
            <ul>
                <li><a href="index.html" class="active-if-index">📊 Live Monitor</a></li>
                <li><a href="ai-dashboard.html" class="active-if-dashboard">🤖 AI Insights</a></li>
                <li><a href="recommendations.html" class="active-if-recs">💡 Recommendations</a></li>
                <li><a href="analysis-history.html" class="active-if-history">📜 Analysis History</a></li>
                <li><a href="charts.html" class="active-if-charts">📈 Analytics & Charts</a></li>
            </ul>
        </nav>
        <!-- Header -->
        <div class="header">
            <h1>🚨 Anomaly Detection</h1>
            <a href="ai-dashboard.html" class="btn btn-secondary">
                ← Back to Dashboard
            </a>
        </div>

        <!-- Statistics Bar -->
        <div class="stats-bar" id="statsBar">
            <div class="stat-item">
                <div class="stat-value critical" id="criticalCount">-</div>
                <div class="stat-label">Critical</div>
            </div>
            <div class="stat-item">
                <div class="stat-value high" id="highCount">-</div>
                <div class="stat-label">High</div>
            </div>
            <div class="stat-item">
                <div class="stat-value medium" id="mediumCount">-</div>
                <div class="stat-label">Medium</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="unresolvedCount">-</div>
                <div class="stat-label">Unresolved</div>
            </div>
            <div class="stat-item">
                <div class="stat-value resolved" id="resolvedCount">-</div>
                <div class="stat-label">Resolved</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="devicesAffected">-</div>
                <div class="stat-label">Devices Affected</div>
            </div>
        </div>

        <!-- Filters -->
        <div class="filters-bar">
            <div class="filter-group">
                <label>Status</label>
                <select class="filter-select" id="filterStatus" onchange="applyFilters()">
                    <option value="">All</option>
                    <option value="false" selected>Unresolved Only</option>
                    <option value="true">Resolved</option>
                </select>
            </div>

            <div class="filter-group">
                <label>Severity</label>
                <select class="filter-select" id="filterSeverity" onchange="applyFilters()">
                    <option value="">All Severities</option>
                    <option value="Critical">Critical</option>
                    <option value="High">High</option>
                    <option value="Medium">Medium</option>
                    <option value="Low">Low</option>
                </select>
            </div>

            <div class="filter-group">
                <label>Device</label>
                <select class="filter-select" id="filterDevice" onchange="applyFilters()">
                    <option value="">All Devices</option>
                </select>
            </div>

            <div class="filter-group">
                <label>Start Date</label>
                <input type="date" class="filter-input" id="filterStartDate" onchange="applyFilters()">
            </div>

            <div class="filter-group">
                <label>End Date</label>
                <input type="date" class="filter-input" id="filterEndDate" onchange="applyFilters()">
            </div>
        </div>

        <!-- Content -->
        <div class="content-card">
            <div class="anomalies-list" id="anomaliesList">
                <div class="loading">
                    <div class="spinner"></div>
                    <div>Loading anomalies...</div>
                </div>
            </div>

            <!-- Pagination -->
            <div class="pagination" id="pagination" style="display: none;"></div>
        </div>
    </div>

    <!-- Resolve Modal -->
    <div class="modal" id="resolveModal">
        <div class="modal-content">
            <div class="modal-header">Resolve Anomaly</div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Resolution Notes</label>
                    <textarea id="resolutionNotes" placeholder="Describe how this anomaly was resolved..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn action-btn btn-cancel" onclick="closeResolveModal()">Cancel</button>
                <button class="btn action-btn btn-confirm" onclick="confirmResolve()">Resolve</button>
            </div>
        </div>
    </div>

    <script>
        const baseUrl = window.location.origin;
        let currentPage = 1;
        let totalPages = 1;
        let currentAnomalyId = null;
        let currentFilters = {
            isResolved: 'false',
            severity: '',
            deviceId: '',
            startDate: '',
            endDate: ''
        };

        // ===== Load Anomalies =====
        async function loadAnomalies() {
            try {
                const params = new URLSearchParams({
                    page: currentPage,
                    pageSize: 10,
                    ...(currentFilters.isResolved && { isResolved: currentFilters.isResolved }),
                    ...(currentFilters.severity && { severity: currentFilters.severity }),
                    ...(currentFilters.deviceId && { deviceId: currentFilters.deviceId }),
                    ...(currentFilters.startDate && { startDate: currentFilters.startDate }),
                    ...(currentFilters.endDate && { endDate: currentFilters.endDate })
                });

                const response = await fetch(`${baseUrl}/api/AI/anomalies?${params}`);
                const data = await response.json();

                displayStatistics(data.statistics);
                displayAnomalies(data.data);
                displayPagination(data.page, data.totalPages);
                populateDeviceFilter(data.data);
            } catch (error) {
                console.error('Error loading anomalies:', error);
                document.getElementById('anomaliesList').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">⚠️</div>
                        <div>Failed to load anomalies</div>
                    </div>
                `;
            }
        }

        function displayStatistics(stats) {
            document.getElementById('criticalCount').textContent = stats.Critical || 0;
            document.getElementById('highCount').textContent = stats.High || 0;
            document.getElementById('mediumCount').textContent = stats.Medium || 0;
            document.getElementById('unresolvedCount').textContent = stats.Unresolved;
            document.getElementById('resolvedCount').textContent = stats.Resolved;
            document.getElementById('devicesAffected').textContent = stats.DevicesAffected;
        }

        function displayAnomalies(anomalies) {
            const container = document.getElementById('anomaliesList');

            if (!anomalies || anomalies.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">✅</div>
                        <div>No anomalies found</div>
                        <p style="margin-top: 10px;">Try adjusting your filters</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = anomalies.map(anomaly => `
                <div class="anomaly-card ${anomaly.severity.toLowerCase()} ${anomaly.isResolved ? 'resolved' : ''}">
                    <div class="anomaly-header">
                        <div class="device-info">
                            <div class="device-name">
                                ${anomaly.isResolved ? '✓' : '⚠️'} ${anomaly.device.name}
                            </div>
                            <div class="device-meta">
                                <span>📍 ${anomaly.device.zone}</span>
                                <span>🏷️ ${anomaly.device.type}</span>
                                <span>⏰ ${new Date(anomaly.detectedAt).toLocaleString()}</span>
                                ${anomaly.daysSinceDetection > 0 ? `<span>📅 ${anomaly.daysSinceDetection} days ago</span>` : ''}
                            </div>
                        </div>
                        <span class="severity-badge severity-${anomaly.severity.toLowerCase()}">
                            ${anomaly.severity}
                        </span>
                    </div>

                    <div class="anomaly-description">
                        ${anomaly.description}
                    </div>

                    <div class="deviation-section">
                        <div class="deviation-item">
                            <div class="deviation-label">Expected</div>
                            <div class="deviation-value">${anomaly.expectedValue.toFixed(3)} kW</div>
                        </div>
                        <div class="deviation-item">
                            <div class="deviation-label">Actual</div>
                            <div class="deviation-value">${anomaly.actualValue.toFixed(3)} kW</div>
                        </div>
                        <div class="deviation-item">
                            <div class="deviation-label">Deviation</div>
                            <div class="deviation-value deviation-percent">
                                ${anomaly.deviationPercent > 0 ? '+' : ''}${anomaly.deviationPercent.toFixed(1)}%
                            </div>
                        </div>
                    </div>

                    ${anomaly.possibleCauses && anomaly.possibleCauses.length > 0 ? `
                        <div class="possible-causes">
                            <div class="causes-title">
                                <span>🔍</span>
                                <span>Possible Causes:</span>
                            </div>
                            <ul class="causes-list">
                                ${anomaly.possibleCauses.map(cause => `<li>${cause}</li>`).join('')}
                            </ul>
                        </div>
                    ` : ''}

                    ${anomaly.isResolved ? `
                        <div class="resolution-section">
                            <div class="resolution-header">
                                <span>✓</span>
                                <span>Resolved on ${new Date(anomaly.resolvedAt).toLocaleDateString()}</span>
                            </div>
                            ${anomaly.resolutionNotes ? `
                                <div class="resolution-notes">"${anomaly.resolutionNotes}"</div>
                            ` : ''}
                        </div>
                    ` : ''}

                    <div class="anomaly-footer">
                        <div class="anomaly-timestamps">
                            <span>🕐 Anomaly Time: ${new Date(anomaly.anomalyTimestamp).toLocaleString()}</span>
                        </div>
                        <div class="anomaly-actions">
                            ${anomaly.isResolved ? `
                                <div class="resolved-badge">
                                    <span>✓</span>
                                    <span>Resolved</span>
                                </div>
                            ` : `
                                <button class="action-btn action-btn-resolve" onclick="openResolveModal(${anomaly.id})">
                                    <span>✓</span>
                                    <span>Resolve</span>
                                </button>
                                <button class="action-btn action-btn-delete" onclick="deleteAnomaly(${anomaly.id})">
                                    <span>🗑️</span>
                                    <span>Delete</span>
                                </button>
                            `}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function displayPagination(page, total) {
            totalPages = total;
            const pagination = document.getElementById('pagination');

            if (total <= 1) {
                pagination.style.display = 'none';
                return;
            }

            pagination.style.display = 'flex';

            let html = `
                <button class="page-btn" onclick="goToPage(${page - 1})" ${page === 1 ? 'disabled' : ''}>
                    ← Previous
                </button>
            `;

            for (let i = 1; i <= Math.min(total, 5); i++) {
                html += `
                    <button class="page-btn ${i === page ? 'active' : ''}" onclick="goToPage(${i})">
                        ${i}
                    </button>
                `;
            }

            if (total > 5) {
                html += `<span>...</span>`;
            }

            html += `
                <button class="page-btn" onclick="goToPage(${page + 1})" ${page === total ? 'disabled' : ''}>
                    Next →
                </button>
            `;

            pagination.innerHTML = html;
        }

        function populateDeviceFilter(anomalies) {
            const devices = [...new Set(anomalies.map(a => ({ id: a.device.id, name: a.device.name })))];
            const select = document.getElementById('filterDevice');

            devices.forEach(device => {
                if (!Array.from(select.options).some(opt => opt.value == device.id)) {
                    const option = document.createElement('option');
                    option.value = device.id;
                    option.textContent = device.name;
                    select.appendChild(option);
                }
            });
        }

        function applyFilters() {
            currentFilters = {
                isResolved: document.getElementById('filterStatus').value,
                severity: document.getElementById('filterSeverity').value,
                deviceId: document.getElementById('filterDevice').value,
                startDate: document.getElementById('filterStartDate').value,
                endDate: document.getElementById('filterEndDate').value
            };
            currentPage = 1;
            loadAnomalies();
        }

        function goToPage(page) {
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            loadAnomalies();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ===== Modal Functions =====
        function openResolveModal(id) {
            currentAnomalyId = id;
            document.getElementById('resolutionNotes').value = '';
            document.getElementById('resolveModal').classList.add('show');
        }

        function closeResolveModal() {
            document.getElementById('resolveModal').classList.remove('show');
            currentAnomalyId = null;
        }

        async function confirmResolve() {
            const notes = document.getElementById('resolutionNotes').value;

            if (!notes.trim()) {
                alert('Please provide resolution notes');
                return;
            }

            try {
                const response = await fetch(`${baseUrl}/api/AI/anomalies/${currentAnomalyId}/resolve`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ resolutionNotes: notes })
                });

                if (response.ok) {
                    alert('✅ Anomaly resolved!');
                    closeResolveModal();
                    loadAnomalies();
                } else {
                    alert('❌ Failed to resolve anomaly');
                }
            } catch (error) {
                console.error('Error resolving anomaly:', error);
                alert('❌ Error resolving anomaly');
            }
        }

        async function deleteAnomaly(id) {
            if (!confirm('Are you sure you want to delete this anomaly?')) return;

            try {
                const response = await fetch(`${baseUrl}/api/AI/anomalies/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    alert('✅ Anomaly deleted!');
                    loadAnomalies();
                } else {
                    alert('❌ Failed to delete anomaly');
                }
            } catch (error) {
                console.error('Error deleting anomaly:', error);
                alert('❌ Error deleting anomaly');
            }
        }

        // ===== Initialize =====
        loadAnomalies();
    </script>
</body>
</html>
