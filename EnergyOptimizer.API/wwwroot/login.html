<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Login- Energy Optimizer</title>
    <script src="auth-helper.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7f6;
            display: flex;
            align-items: center;
            height: 100vh;
        }

        .login-card {
            max-width: 400px;
            width: 100%;
            margin: auto;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            background: white;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h3 class="text-center mb-4">Energy Optimizer</h3>
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" id="email" class="form-control" required placeholder="admin@energy.com">
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">دخول</button>
            <div id="message" class="mt-3 text-center text-danger"></div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');

            try {
                const response = await fetch('/api/account/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const result = await response.json();
                console.log("API Response:", result);

                if (response.ok && result.details && result.details.token) {
                    // save token to localStorage
                    localStorage.setItem('token', result.details.token);
                    // save user details to localStorage
                    localStorage.setItem('user', JSON.stringify(result.details.user));
                    // redirect to main page
                    window.location.href = 'index.html';
                } else {
                    messageDiv.innerText = result.message || "login failed";
                }
            } catch (error) {
                messageDiv.innerText = "An error occurred while connecting to the server.";
            }
        });
    </script>
</body>
</html>
