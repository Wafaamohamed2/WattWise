<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Energy Optimizer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7f6;
            display: flex;
            align-items: center;
            min-height: 100vh;
        }

        .login-card {
            max-width: 420px;
            width: 100%;
            margin: auto;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            background: white;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h3 class="text-center mb-4">⚡ Energy Optimizer</h3>
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" id="email" class="form-control" placeholder="you@example.com">
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" id="password" class="form-control">
        </div>
        <button class="btn btn-primary w-100" id="loginBtn" onclick="doLogin()">Sign In</button>
        <div id="message" class="mt-3 text-center text-danger small"></div>
        <div class="mt-3 text-center" style="color:#6b7280; font-size:0.9em;">
            Don't have an account? <a href="register.html" style="color:#667eea;font-weight:600;">Create one</a>
        </div>
    </div>
    <script>
        async function doLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const msg = document.getElementById('message');

            if (!email || !password) { msg.innerText = 'Please fill in all fields.'; return; }

            btn.disabled = true;
            btn.textContent = 'Signing in...';
            msg.innerText = '';

            try {
                const res = await fetch('/api/account/login', {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const body = await res.json();

                if (!res.ok) {
                    msg.innerText = body.Message ?? body.message ?? 'Login failed';
                    btn.disabled = false;
                    btn.textContent = 'Sign In';
                    return;
                }

                window.location.href = 'index.html';

            } catch (err) {
                msg.innerText = 'Error: ' + err.message;
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        }

        document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    </script>
</body>
</html>
