<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login - Energy Optimizer</title>
    <script src="auth-helper.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .brand {
            text-align: center;
            margin-bottom: 32px;
        }

        .brand h2 {
            font-size: 1.8em;
            color: #667eea;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .brand p {
            color: #6b7280;
            font-size: 0.95em;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-weight: 600;
            color: #374151;
            font-size: 0.9em;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 11px 14px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1em;
            font-family: inherit;
            transition: border-color 0.2s;
            outline: none;
        }

        input:focus {
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            margin-top: 8px;
            transition: opacity 0.2s;
        }

        .btn:hover:not(:disabled) {
            opacity: 0.9;
        }

        .btn:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }

        .message {
            margin-top: 14px;
            text-align: center;
            font-size: 0.9em;
            min-height: 20px;
            color: #dc2626;
        }

        .message.success {
            color: #16a34a;
        }

        .footer-link {
            text-align: center;
            margin-top: 20px;
            color: #6b7280;
            font-size: 0.9em;
        }

        .footer-link a {
            color: #667eea;
            font-weight: 600;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="brand">
            <h2>⚡ Energy Optimizer</h2>
            <p>Sign in to your account</p>
        </div>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Your password" autocomplete="current-password">
        </div>
        <button class="btn" id="loginBtn" onclick="doLogin()">Sign In</button>
        <div class="message" id="message"></div>
        <div id="resendContainer" style="display:none; text-align:center; margin-top:10px;">
            <a href="#" id="resendBtn" onclick="resendVerification(event)" style="color:#667eea; font-weight:600; font-size:0.9em; text-decoration:none;">
                📩 Didn't receive verification email? Click to resend
            </a>
        </div>
        <div class="footer-link">
            Don't have an account? <a href="register.html">Create one</a>
        </div>
    </div>

    <script>
        async function doLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const msg = document.getElementById('message');
            const resendBox = document.getElementById('resendContainer');

            if (!email || !password) { showMsg('Please fill in all fields.', false); return; }

            btn.disabled = true;
            btn.textContent = 'Signing in...';
            msg.className = 'message';
            msg.innerText = '';
            resendBox.style.display = 'none';

            try {
                const res = await fetch(AuthHelper.API_BASE_URL + '/api/v1/account/login', {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const body = await res.json();

                if (!res.ok) {
                    const errorText = body.message ?? body.Message ?? 'Login failed';
                    showMsg(errorText, false);
                    btn.disabled = false;
                    btn.textContent = 'Sign In';

                    if (errorText.toLowerCase().includes('confirm') || errorText.toLowerCase().includes('email')) {
                        resendBox.style.display = 'block';
                    }
                    return;
                }

                showMsg('Login successful! Redirecting...', true);
                setTimeout(() => { window.location.href = 'index.html'; }, 300);

            } catch (err) {
                showMsg('Connection error: ' + err.message, false);
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        }

        async function resendVerification(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const resendBtn = document.getElementById('resendBtn');
            if (!email) {
                showMsg('Please enter your email address first.', false);
                return;
            }

            resendBtn.innerText = 'Sending verification link...';
            resendBtn.style.pointerEvents = 'none';

            try {
                const res = await fetch(AuthHelper.API_BASE_URL + '/api/v1/account/resend-confirmation-email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const body = await res.json();
                showMsg(body.message ?? body.Message ?? 'Verification email sent!', true);
            } catch (err) {
                showMsg('Failed to send verification email: ' + err.message, false);
            } finally {
                resendBtn.innerText = '📩 Didn\'t receive verification email? Click to resend';
                resendBtn.style.pointerEvents = 'auto';
            }
        }

        function showMsg(text, ok) {
            const el = document.getElementById('message');
            el.innerText = text;
            el.className = 'message' + (ok ? ' success' : '');
        }

        document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    </script>
</body>

</html>
